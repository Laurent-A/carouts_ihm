<div class="iform">

  <app-topbar
    [titre]="titre"
    [retour]="true"
    (retourClick)="annuler()">
  </app-topbar>

  @if (loading()) {
    <div class="loading-state">
      <div class="loading-state__spinner"></div>
    </div>
  }

  @if (!loading()) {
    <form class="iform__body" [formGroup]="form" (ngSubmit)="sauvegarder()">

      <!-- Contexte véhicule -->
      @if (vehicule()) {
        <div class="vehicule-context">
          <span class="vehicule-context__nom">{{ vehicule()!.nom }}</span>
          <span class="vehicule-context__km">{{ vehicule()!.kilometrage.toLocaleString('fr-FR') }} km</span>
        </div>
      }

      <!-- ── Prestation ───────────────────────────────────────────────────────── -->
      <div class="form-section">
        <label class="form-label">Type d'intervention <span class="form-required">*</span></label>
        <app-chip-selector
          [options]="prestationOptions()"
          [multiple]="false"
          formControlName="prestationId">
        </app-chip-selector>
        @if (prestationInvalid) {
          <span class="form-error">Sélectionnez un type d'intervention</span>
        }
      </div>

      <!-- ── Date ────────────────────────────────────────────────────────────── -->
      <div class="form-section">
        <label class="form-label" for="date">Date <span class="form-required">*</span></label>
        <input
          id="date"
          type="date"
          class="form-input"
          [class.form-input--error]="dateInvalid"
          formControlName="date" />
        @if (dateInvalid) {
          <span class="form-error">La date est obligatoire</span>
        }
      </div>

      <!-- ── Kilométrage & Prix ───────────────────────────────────────────────── -->
      <div class="form-row">
        <div class="form-section">
          <label class="form-label" for="kilometrage">Kilométrage</label>
          <div class="input-suffix-wrap">
            <input
              id="kilometrage"
              type="number"
              inputmode="numeric"
              class="form-input"
              formControlName="kilometrage"
              placeholder="0"
              min="0" />
            <span class="input-suffix">km</span>
          </div>
        </div>
        <div class="form-section">
          <label class="form-label" for="prix">Coût</label>
          <div class="input-suffix-wrap">
            <input
              id="prix"
              type="number"
              inputmode="decimal"
              class="form-input"
              formControlName="prix"
              placeholder="0"
              min="0"
              step="0.01" />
            <span class="input-suffix">€</span>
          </div>
        </div>
      </div>

      <!-- ── Prestataire ─────────────────────────────────────────────────────── -->
      <div class="form-section">
        <label class="form-label" for="prestataire">Prestataire</label>
        <input
          id="prestataire"
          type="text"
          class="form-input"
          formControlName="prestataire"
          placeholder="Ex : Garage Martin, Norauto…"
          autocomplete="off" />
      </div>

      <!-- ── Notes ──────────────────────────────────────────────────────────── -->
      <div class="form-section">
        <label class="form-label" for="notes">Notes</label>
        <textarea
          id="notes"
          class="form-textarea"
          formControlName="notes"
          placeholder="Informations complémentaires…"
          rows="3">
        </textarea>
      </div>

      <!-- ── Photo ──────────────────────────────────────────────────────────── -->
      <div class="form-section">
        <label class="form-label">Photo de facture</label>
        <app-photo-picker formControlName="photoPath"></app-photo-picker>
      </div>

      <!-- ── Actions ────────────────────────────────────────────────────────── -->
      <div class="form-actions">
        <button type="button" class="btn-secondary" (click)="annuler()">
          Annuler
        </button>
        <button type="submit" class="btn-primary" [disabled]="saving()">
          @if (saving()) {
            <span class="btn-spinner"></span>
          } @else {
            {{ estEdition ? 'Enregistrer' : 'Ajouter' }}
          }
        </button>
      </div>

    </form>
  }

</div>
