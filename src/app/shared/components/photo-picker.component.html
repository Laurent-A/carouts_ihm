<!-- Aperçu si photo présente -->
@if (photo) {
  <div class="photo-picker photo-picker--filled">
    <img class="photo-picker__preview" [src]="photo" alt="Aperçu facture" />
    <button type="button" class="photo-picker__remove" (click)="supprimer()" aria-label="Supprimer la photo">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
}

<!-- Zone de dépôt si pas de photo -->
@if (!photo) {
  <button type="button" class="photo-picker photo-picker--empty"
          [class.photo-picker--loading]="loading"
          [disabled]="disabled"
          (click)="choisirPhoto()">
    @if (loading) {
      <div class="photo-picker__spinner"></div>
    } @else {
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
      <span>Ajouter une photo</span>
      <span class="photo-picker__sub">Facture ou reçu — optionnel</span>
    }
  </button>
}
