<header class="topbar">
  <div class="topbar__inner">

    <!-- Gauche : retour ou espace vide -->
    <div class="topbar__left">
      @if (retour) {
        <button class="topbar__icon-btn" (click)="onRetour()" aria-label="Retour">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
      }
    </div>

    <!-- Centre : titre -->
    <h1 class="topbar__titre">{{ titre }}</h1>

    <!-- Droite : action optionnelle -->
    <div class="topbar__right">
      @if (actionDroite === 'edit') {
        <button class="topbar__icon-btn" (click)="actionClick.emit()" aria-label="Modifier">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
      }
      @if (actionDroite === 'delete') {
        <button class="topbar__icon-btn topbar__icon-btn--danger" (click)="actionClick.emit()" aria-label="Supprimer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
            <path d="M10 11v6"/><path d="M14 11v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>
      }
      @if (actionDroite === 'save') {
        <button class="topbar__icon-btn topbar__icon-btn--save" (click)="actionClick.emit()" aria-label="Enregistrer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
               stroke="currentColor" stroke-width="2.5"
               stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </button>
      }
      @if (!actionDroite) {
        <div class="topbar__placeholder"></div>
      }
    </div>

  </div>
</header>
